          - text: ：万一アプリが落ちても、未送信分は端末内に保存され、次回起動時に自動で再送されます
      - generic [ref=e111]: 60分を超える会議：いったん「保存して完了」し、同じMTGで再度録音すると続きを追記できます。長い録画ファイルをPCから取り込む場合は、自動的に分割して処理されます。
      - generic [ref=e112]: 端末内の履歴：スマホ内の録音履歴は約24時間で自動削除されます。確定保存はアップロード後のPC側（サーバー）に残ります。
