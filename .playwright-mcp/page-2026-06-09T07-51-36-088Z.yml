        - text: このアプリについて
      - paragraph [ref=e32]: 対面での打ち合わせを、iPhoneで録音し、AIで高精度に文字起こしして、PCで確認するためのアプリです。
      - paragraph [ref=e33]:
        - text: 本アプリは
        - strong [ref=e34]: 二段階方式
        - text: を採用しています。スマホでは「誰が話したか」を手元で記録しながら録音し、PC側でAIが高精度に文字起こし・整文します。スマホ画面のリアルタイム文字起こしは
        - strong [ref=e35]: あくまで参考
        - text: で、確定版はPCで生成されます。
      - generic [ref=e36]:
        - generic [ref=e37]:
          - heading "① スマホで録音" [level=4] [ref=e38]
          - paragraph [ref=e39]: 音声を録音
          - paragraph [ref=e40]: 話者ボタンで「誰が話したか」を記録
          - paragraph [ref=e41]: リアルタイム文字起こしは参考表示
        - generic [ref=e42]: →
        - generic [ref=e43]:
